# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Shared environment for test jobs
  CHROMA_HOST: http://chroma:8000
  TEMPORAL_HOST: temporal:7233
  OLLAMA_BASE_URL: http://ollama:11434
  LOG_LEVEL: INFO

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff mypy types-PyYAML
      - run: ruff check backend/ --fix
      - run: mypy backend/ --ignore-missing-imports

  # Pre-pull Docker images to avoid delays during test jobs
  # This runs in parallel with lint-and-typecheck to save time
  setup-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull test service images
        run: |
          echo "=== [PRE-PULL] $(date -Iseconds) ==="
          docker compose --profile test pull chroma ollama
          echo "=== [PRE-PULL-DONE] $(date -Iseconds) ==="

  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e "backend[test]"
      - name: Create dummy .env for CI
        run: |
          cat > .env << 'EOF'
          OPENROUTER_API_KEY=sk-dummy-key-for-ci-only
          FERNET_KEY=dummy_fernet_key_for_ci_only_not_real
          CHROMA_HOST=http://chroma:8000
          TEMPORAL_HOST=temporal:7233
          OLLAMA_BASE_URL=http://ollama:11434
          LOG_LEVEL=INFO
          EOF
          touch .env.local
      - name: Collect tests first (catch import errors early)
        run: pytest backend/tests/unit --collect-only -q
      - name: Run unit tests
        env:
          PYTEST_TIMEOUTDESTROY: "true"
        run: |
          set -o pipefail
          echo "=== [UNIT-TESTS-START] $(date -Iseconds) ==="
          pytest backend/tests/unit -q --tb=short -v -p no:term_output
          EXIT_CODE=$?
          pkill -P $$ 2>/dev/null || true
          echo "=== [UNIT-TESTS-DONE] exit=$EXIT_CODE $(date -Iseconds) ==="
          exit $EXIT_CODE

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, setup-services]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e "backend[test]"
      - name: Create dummy .env for CI
        run: |
          cat > .env << 'EOF'
          OPENROUTER_API_KEY=sk-dummy-key-for-ci-only
          FERNET_KEY=dummy_fernet_key_for_ci_only_not_real
          CHROMA_HOST=http://chroma:8000
          TEMPORAL_HOST=temporal:7233
          OLLAMA_BASE_URL=http://ollama:11434
          LOG_LEVEL=INFO
          EOF
          touch .env.local
      - name: Run services and integration tests
        env:
          PYTEST_TIMEOUTDESTROY: "true"
        run: |
          echo "=== [SERVICES-START] $(date -Iseconds) ==="
          docker compose --profile test up -d
          echo "=== [SERVICES-UP] $(date -Iseconds) ==="

          echo "=== [CHROMA-WAIT-START] $(date -Iseconds) ==="
          for i in $(seq 1 24); do
            docker exec $(docker compose ps -q chroma 2>/dev/null) \
              python -c "import httpx; httpx.get('http://127.0.0.1:8000/api/v1/heartbeat').raise_for_status()" 2>/dev/null && \
              echo "=== [CHROMA-READY] after ${i}0s ===" && break
            if [ $i -eq 24 ]; then
              echo "=== [CHROMA-FAILED] $(date -Iseconds) ==="
              docker compose logs chroma
              exit 1
            fi
            sleep 5
          done

          set -o pipefail
          echo "=== [INTEGRATION-TESTS-START] $(date -Iseconds) ==="
          pytest backend/tests/integration -q --tb=short -v -p no:term_output
          EXIT_CODE=$?
          pkill -P $$ 2>/dev/null || true
          echo "=== [INTEGRATION-TESTS-DONE] exit=$EXIT_CODE $(date -Iseconds) ==="
          exit $EXIT_CODE

          echo "=== [CLEANUP-START] $(date -Iseconds) ==="
          docker compose --profile test kill 2>/dev/null || true
          docker container prune -f >/dev/null 2>&1 || true
          timeout 60 docker compose --profile test down --timeout 5 --remove-orphans 2>/dev/null || true
          echo "=== [CLEANUP-DONE] $(date -Iseconds) ==="

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          VERSION=$(date +%Y%m%d%H%M)
          docker compose build backend frontend
          docker compose push ghcr.io/${{ github.repository }}/backend:$VERSION
          docker compose push ghcr.io/${{ github.repository }}/frontend:$VERSION

  release:
    runs-on: ubuntu-latest
    needs: [build-images]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: softprops/action-gh-release@v1
        with:
          files: CHANGELOG.md