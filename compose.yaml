# MindForge — self-hosted AI agent platform
# Usage:
#   docker compose up -d                    # production
#   docker compose --profile dev up -d      # + frontend dev (Vite HMR)
#   docker compose --profile test up -d    # integration test environment

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: [dev, prod, test]
    restart: unless-stopped
    volumes:
      - backend_data:/app/data
      - ./logs/backend:/app/logs
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - CHROMA_HOST=http://chroma:8000
      - TEMPORAL_HOST=temporal:7233
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file: [.env, .env.local]
    depends_on:
      chroma:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - mindforge
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    profiles: [prod]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - mindforge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend_dev:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    volumes:
      # Bind-mount source for HMR; node_modules stays inside the container
      # to avoid host-vs-image arch mismatch (e.g. esbuild native binaries).
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
    depends_on:
      - backend
    networks:
      - mindforge

  chroma:
    image: chromadb/chroma:0.6.3
    profiles: [dev, prod, test]
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - mindforge
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/api/v1/heartbeat').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
    read_only: false
    tmpfs:
      - /tmp

  ollama:
    image: ollama/ollama:latest
    profiles: [dev, prod, test]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mindforge
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ----------------------------------------------------------------------------
  # Temporal — proactive workflow engine (Phase 3, optional)
  # AGENTS.md rule #6 / SPEC.md §5.3: Temporal is a Phase 3 feature, gated behind
  # ENABLE_TEMPORAL=true. Use `docker compose --profile temporal up -d` (or
  # `docker compose up -d temporal`) to start the workflow engine; the rest of
  # the system runs without it.
  # ----------------------------------------------------------------------------
  temporal-postgres:
    image: postgres:16-alpine
    profiles: [temporal]
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    networks:
      - mindforge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.27.0
    profiles: [temporal]
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - LOG_LEVEL=warn
    depends_on:
      temporal-postgres:
        condition: service_healthy
    networks:
      - mindforge
    ports:
      - "127.0.0.1:7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "tctl --address 127.0.0.1:7233 cluster health 2>/dev/null || temporal operator cluster health --address 127.0.0.1:7233 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:2.27.0
    profiles: [temporal]
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - temporal
    networks:
      - mindforge
    ports:
      - "127.0.0.1:8088:8080"

networks:
  mindforge:
    driver: bridge

volumes:
  backend_data:
  chroma_data:
  ollama_data:
  temporal_postgres_data:
