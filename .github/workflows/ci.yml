# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff mypy types-PyYAML
      - run: ruff check backend/ --fix
      - run: mypy backend/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create dummy .env for CI
        run: |
          cat > .env << 'EOF'
          OPENROUTER_API_KEY=sk-dummy-key-for-ci-only
          FERNET_KEY=dummy_fernet_key_for_ci_only_not_real
          CHROMA_HOST=http://chroma:8000
          TEMPORAL_HOST=temporal:7233
          OLLAMA_BASE_URL=http://ollama:11434
          LOG_LEVEL=INFO
          EOF
          touch .env.local
      - name: Test with diagnostics and cleanup
        run: |
          echo "=== [STEP-START] $(date -Iseconds) ==="
          echo "github.run_id=$GITHUB_RUN_ID github.run_attempt=$GITHUB_RUN_ATTEMPT"

          echo "=== [SERVICES-START] $(date -Iseconds) ==="
          docker compose --profile test up -d --build
          echo "=== [SERVICES-UP] $(date -Iseconds) ==="

          echo "=== [CHROMA-WAIT-START] $(date -Iseconds) ==="
          for i in $(seq 1 24); do
            docker exec $(docker compose ps -q chroma 2>/dev/null) \
              python -c "import httpx; httpx.get('http://127.0.0.1:8000/api/v1/heartbeat').raise_for_status()" 2>/dev/null && \
              echo "=== [CHROMA-READY] after ${i}0s ===" && break
            if [ $i -eq 24 ]; then
              echo "=== [CHROMA-FAILED] $(date -Iseconds) ==="
              docker compose logs chroma
              exit 1
            fi
            sleep 5
          done

          echo "=== [TESTS-START] $(date -Iseconds) ==="
          # Copy backend source into container (container runs as appuser, source is root-owned)
          # so appuser can read the mounted files without permission errors.
          docker compose cp backend/. backend:/app/backend/tests-unit-tmp/
          docker compose cp backend/. backend:/app/backend/tests-integration-tmp/
          set -o pipefail
          timeout 300 docker compose exec --user root --workdir /app backend \
            pytest /app/backend/tests-unit-tmp -q --tb=short
          UNIT_EXIT=$?
          timeout 300 docker compose exec --user root --workdir /app backend \
            pytest /app/backend/tests-integration-tmp -q --tb=short
          INTEGRATION_EXIT=$?
          set +o pipefail
          TEST_EXIT=$((UNIT_EXIT == 0 ? INTEGRATION_EXIT : UNIT_EXIT))
          echo "=== [TESTS-DONE] unit=$UNIT_EXIT integration=$INTEGRATION_EXIT exit=$TEST_EXIT $(date -Iseconds) ==="

          echo "=== [CLEANUP-START] $(date -Iseconds) ==="
          docker compose --profile test kill 2>/dev/null || true
          docker container prune -f >/dev/null 2>&1 || true
          timeout 60 docker compose --profile test down --timeout 5 --remove-orphans 2>/dev/null || true
          echo "=== [CLEANUP-DONE] $(date -Iseconds) ==="
          echo "=== [STEP-END] $(date -Iseconds) ==="

          exit $TEST_EXIT

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          VERSION=$(date +%Y%m%d%H%M)
          docker compose build backend frontend
          docker compose push ghcr.io/${{ github.repository }}/backend:$VERSION
          docker compose push ghcr.io/${{ github.repository }}/frontend:$VERSION

  release:
    runs-on: ubuntu-latest
    needs: [build-images]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: softprops/action-gh-release@v1
        with:
          files: CHANGELOG.md
